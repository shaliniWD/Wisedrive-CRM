openapi: 3.0.3
info:
  title: Wisedrive Platform API
  description: |
    Master API specification for Wisedrive automotive inspection platform.
    
    ## Authentication
    All endpoints require Bearer token authentication unless marked as public.
    
    ## Multi-tenancy
    Platform supports multi-country operations. Country context is determined by:
    - User's assigned country (from token)
    - Explicit country_id parameter (for CEO/admin)
    
    ## Rate Limiting
    - Standard: 100 requests/minute
    - Bulk operations: 10 requests/minute
    
  version: 1.0.0
  contact:
    name: Wisedrive Platform Team
    email: platform@wisedrive.com
  license:
    name: Proprietary
    
servers:
  - url: https://api.wisedrive.com/v1
    description: Production
  - url: https://api-test.wisedrive.com/v1
    description: Test
  - url: https://api-dev.wisedrive.com/v1
    description: Development

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Employees
    description: Employee management (HR module)
  - name: Leads
    description: Sales lead management
  - name: Customers
    description: Customer records
  - name: Vehicles
    description: Vehicle information
  - name: Inspections
    description: Inspection operations
  - name: OBD
    description: OBD scan sessions and DTC codes
  - name: Payments
    description: Payment processing
  - name: Reports
    description: Inspection reports
  - name: CarData
    description: External vehicle data (Invincible Ocean)

paths:
  # ==================== AUTHENTICATION ====================
  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user profile
      operationId: getCurrentUser
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  # ==================== EMPLOYEES ====================
  /employees:
    get:
      tags: [Employees]
      summary: List employees
      operationId: listEmployees
      parameters:
        - $ref: '#/components/parameters/CountryFilter'
        - $ref: '#/components/parameters/DepartmentFilter'
        - $ref: '#/components/parameters/RoleFilter'
        - $ref: '#/components/parameters/StatusFilter'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Employee list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeListResponse'
    post:
      tags: [Employees]
      summary: Create employee
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeCreateRequest'
      responses:
        '201':
          description: Employee created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'

  /employees/{employee_id}:
    get:
      tags: [Employees]
      summary: Get employee details
      operationId: getEmployee
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      responses:
        '200':
          description: Employee details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeDetail'
    put:
      tags: [Employees]
      summary: Update employee
      operationId: updateEmployee
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeUpdateRequest'
      responses:
        '200':
          description: Employee updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'

  /employees/{employee_id}/salary:
    get:
      tags: [Employees]
      summary: Get employee salary structure
      operationId: getEmployeeSalary
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      responses:
        '200':
          description: Salary structure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalaryStructure'
    post:
      tags: [Employees]
      summary: Save employee salary structure
      operationId: saveEmployeeSalary
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalaryStructureRequest'
      responses:
        '200':
          description: Salary saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalaryStructure'

  /employees/{employee_id}/attendance:
    get:
      tags: [Employees]
      summary: Get employee attendance records
      operationId: getEmployeeAttendance
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Attendance records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceResponse'
    post:
      tags: [Employees]
      summary: Mark employee attendance
      operationId: markAttendance
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceMarkRequest'
      responses:
        '200':
          description: Attendance marked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecord'

  /employees/{employee_id}/documents:
    get:
      tags: [Employees]
      summary: Get employee documents
      operationId: getEmployeeDocuments
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmployeeDocument'
    post:
      tags: [Employees]
      summary: Add employee document
      operationId: addEmployeeDocument
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeDocumentRequest'
      responses:
        '201':
          description: Document added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeDocument'

  # ==================== LEADS ====================
  /leads:
    get:
      tags: [Leads]
      summary: List leads
      operationId: listLeads
      parameters:
        - $ref: '#/components/parameters/CountryFilter'
        - $ref: '#/components/parameters/LeadStatusFilter'
        - $ref: '#/components/parameters/AssignedToFilter'
        - $ref: '#/components/parameters/CityFilter'
        - $ref: '#/components/parameters/SourceFilter'
        - $ref: '#/components/parameters/DateFromFilter'
        - $ref: '#/components/parameters/DateToFilter'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Lead list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadListResponse'
    post:
      tags: [Leads]
      summary: Create lead
      operationId: createLead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadCreateRequest'
      responses:
        '201':
          description: Lead created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'

  /leads/{lead_id}:
    get:
      tags: [Leads]
      summary: Get lead details
      operationId: getLead
      parameters:
        - $ref: '#/components/parameters/LeadId'
      responses:
        '200':
          description: Lead details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadDetail'
    put:
      tags: [Leads]
      summary: Update lead
      operationId: updateLead
      parameters:
        - $ref: '#/components/parameters/LeadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadUpdateRequest'
      responses:
        '200':
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'

  /leads/{lead_id}/status:
    patch:
      tags: [Leads]
      summary: Update lead status (inline)
      operationId: updateLeadStatus
      parameters:
        - $ref: '#/components/parameters/LeadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadStatusUpdateRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'

  /leads/{lead_id}/reassign:
    post:
      tags: [Leads]
      summary: Reassign lead to another employee
      operationId: reassignLead
      parameters:
        - $ref: '#/components/parameters/LeadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadReassignRequest'
      responses:
        '200':
          description: Lead reassigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'

  # ==================== CUSTOMERS ====================
  /customers:
    get:
      tags: [Customers]
      summary: List customers
      operationId: listCustomers
      parameters:
        - $ref: '#/components/parameters/CountryFilter'
        - $ref: '#/components/parameters/CityFilter'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Customer list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerListResponse'
    post:
      tags: [Customers]
      summary: Create customer
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreateRequest'
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'

  /customers/{customer_id}:
    get:
      tags: [Customers]
      summary: Get customer details
      operationId: getCustomer
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: Customer details with vehicles and transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetail'

  # ==================== VEHICLES ====================
  /vehicles:
    get:
      tags: [Vehicles]
      summary: List vehicles
      operationId: listVehicles
      parameters:
        - $ref: '#/components/parameters/CustomerIdFilter'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Vehicle list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleListResponse'
    post:
      tags: [Vehicles]
      summary: Create vehicle
      operationId: createVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleCreateRequest'
      responses:
        '201':
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'

  /vehicles/{vehicle_id}:
    get:
      tags: [Vehicles]
      summary: Get vehicle details
      operationId: getVehicle
      parameters:
        - $ref: '#/components/parameters/VehicleId'
      responses:
        '200':
          description: Vehicle details with inspection history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleDetail'

  /vehicles/lookup/{registration_number}:
    get:
      tags: [Vehicles, CarData]
      summary: Lookup vehicle by registration (uses Invincible Ocean)
      operationId: lookupVehicle
      parameters:
        - name: registration_number
          in: path
          required: true
          schema:
            type: string
          example: "KA01AB1234"
      responses:
        '200':
          description: Vehicle data from external source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleLookupResponse'

  # ==================== INSPECTIONS ====================
  /inspections:
    get:
      tags: [Inspections]
      summary: List inspections
      operationId: listInspections
      parameters:
        - $ref: '#/components/parameters/CountryFilter'
        - $ref: '#/components/parameters/InspectionStatusFilter'
        - $ref: '#/components/parameters/MechanicFilter'
        - $ref: '#/components/parameters/DateFromFilter'
        - $ref: '#/components/parameters/DateToFilter'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Inspection list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectionListResponse'
    post:
      tags: [Inspections]
      summary: Create inspection
      operationId: createInspection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectionCreateRequest'
      responses:
        '201':
          description: Inspection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inspection'

  /inspections/{inspection_id}:
    get:
      tags: [Inspections]
      summary: Get inspection details
      operationId: getInspection
      parameters:
        - $ref: '#/components/parameters/InspectionId'
      responses:
        '200':
          description: Inspection details with all categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectionDetail'
    put:
      tags: [Inspections]
      summary: Update inspection
      operationId: updateInspection
      parameters:
        - $ref: '#/components/parameters/InspectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectionUpdateRequest'
      responses:
        '200':
          description: Inspection updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inspection'

  /inspections/{inspection_id}/assign:
    post:
      tags: [Inspections]
      summary: Assign inspection to mechanic
      operationId: assignInspection
      parameters:
        - $ref: '#/components/parameters/InspectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectionAssignRequest'
      responses:
        '200':
          description: Inspection assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inspection'

  /inspections/{inspection_id}/categories:
    get:
      tags: [Inspections]
      summary: Get inspection categories with results
      operationId: getInspectionCategories
      parameters:
        - $ref: '#/components/parameters/InspectionId'
      responses:
        '200':
          description: Category results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InspectionCategory'
    post:
      tags: [Inspections]
      summary: Save inspection category result
      operationId: saveInspectionCategory
      parameters:
        - $ref: '#/components/parameters/InspectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectionCategoryRequest'
      responses:
        '200':
          description: Category saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectionCategory'

  # ==================== OBD ====================
  /inspections/{inspection_id}/obd:
    get:
      tags: [OBD]
      summary: Get OBD session for inspection
      operationId: getInspectionOBD
      parameters:
        - $ref: '#/components/parameters/InspectionId'
      responses:
        '200':
          description: OBD session data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OBDSession'
    post:
      tags: [OBD]
      summary: Save OBD session for inspection
      operationId: saveInspectionOBD
      parameters:
        - $ref: '#/components/parameters/InspectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OBDSessionRequest'
      responses:
        '201':
          description: OBD session saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OBDSession'

  /obd/sessions:
    get:
      tags: [OBD]
      summary: List OBD sessions (for analytics)
      operationId: listOBDSessions
      parameters:
        - $ref: '#/components/parameters/VehicleIdFilter'
        - $ref: '#/components/parameters/DateFromFilter'
        - $ref: '#/components/parameters/DateToFilter'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: OBD session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OBDSessionListResponse'

  /obd/sessions/{session_id}:
    get:
      tags: [OBD]
      summary: Get OBD session details
      operationId: getOBDSession
      parameters:
        - $ref: '#/components/parameters/OBDSessionId'
      responses:
        '200':
          description: OBD session with DTCs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OBDSessionDetail'

  /obd/dtc-library:
    get:
      tags: [OBD]
      summary: Get DTC code library
      operationId: getDTCLibrary
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by code or description
        - name: category
          in: query
          schema:
            type: string
            enum: [powertrain, chassis, body, network]
      responses:
        '200':
          description: DTC codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DTCCode'

  # ==================== PAYMENTS ====================
  /payments:
    get:
      tags: [Payments]
      summary: List payments
      operationId: listPayments
      parameters:
        - $ref: '#/components/parameters/CountryFilter'
        - $ref: '#/components/parameters/PaymentStatusFilter'
        - $ref: '#/components/parameters/PaymentTypeFilter'
        - $ref: '#/components/parameters/DateFromFilter'
        - $ref: '#/components/parameters/DateToFilter'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Payment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListResponse'
    post:
      tags: [Payments]
      summary: Create payment
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /payments/{payment_id}:
    get:
      tags: [Payments]
      summary: Get payment details
      operationId: getPayment
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentDetail'

  /payments/razorpay/order:
    post:
      tags: [Payments]
      summary: Create Razorpay order
      operationId: createRazorpayOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RazorpayOrderRequest'
      responses:
        '200':
          description: Razorpay order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RazorpayOrderResponse'

  /payments/razorpay/verify:
    post:
      tags: [Payments]
      summary: Verify Razorpay payment
      operationId: verifyRazorpayPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RazorpayVerifyRequest'
      responses:
        '200':
          description: Payment verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /payments/razorpay/webhook:
    post:
      tags: [Payments]
      summary: Razorpay webhook handler
      operationId: handleRazorpayWebhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook processed

  # ==================== REPORTS ====================
  /reports:
    get:
      tags: [Reports]
      summary: List inspection reports
      operationId: listReports
      parameters:
        - $ref: '#/components/parameters/InspectionIdFilter'
        - $ref: '#/components/parameters/CustomerIdFilter'
        - $ref: '#/components/parameters/DateFromFilter'
        - $ref: '#/components/parameters/DateToFilter'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Report list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'

  /reports/{report_id}:
    get:
      tags: [Reports]
      summary: Get inspection report
      operationId: getReport
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Full inspection report with OBD data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectionReport'

  /reports/{report_id}/pdf:
    get:
      tags: [Reports]
      summary: Generate PDF report
      operationId: getReportPDF
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  # ==================== CAR DATA ====================
  /cardata/lookup:
    post:
      tags: [CarData]
      summary: Lookup vehicle data from Invincible Ocean
      operationId: lookupCarData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarDataLookupRequest'
      responses:
        '200':
          description: Vehicle data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarDataResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    # Path Parameters
    EmployeeId:
      name: employee_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LeadId:
      name: lead_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CustomerId:
      name: customer_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VehicleId:
      name: vehicle_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InspectionId:
      name: inspection_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OBDSessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PaymentId:
      name: payment_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      name: report_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    # Query Parameters - Filters
    CountryFilter:
      name: country_id
      in: query
      schema:
        type: string
        format: uuid
    DepartmentFilter:
      name: department_id
      in: query
      schema:
        type: string
        format: uuid
    RoleFilter:
      name: role_id
      in: query
      schema:
        type: string
        format: uuid
    StatusFilter:
      name: status
      in: query
      schema:
        type: string
        enum: [active, exited, all]
    LeadStatusFilter:
      name: status
      in: query
      schema:
        type: string
        enum: [NEW, HOT, CONTACTED, INTERESTED, NOT_INTERESTED, CONVERTED, RNR, FOLLOWUP, LOST]
    InspectionStatusFilter:
      name: status
      in: query
      schema:
        type: string
        enum: [scheduled, in_progress, completed, cancelled]
    PaymentStatusFilter:
      name: status
      in: query
      schema:
        type: string
        enum: [pending, submitted, approved, paid, rejected]
    PaymentTypeFilter:
      name: payment_type
      in: query
      schema:
        type: string
        enum: [salary, mechanic_payout, incentive, vendor, statutory, legal, admin_expense, operational, other]
    AssignedToFilter:
      name: assigned_to
      in: query
      schema:
        type: string
        format: uuid
    MechanicFilter:
      name: mechanic_id
      in: query
      schema:
        type: string
        format: uuid
    CityFilter:
      name: city
      in: query
      schema:
        type: string
    SourceFilter:
      name: source
      in: query
      schema:
        type: string
    CustomerIdFilter:
      name: customer_id
      in: query
      schema:
        type: string
        format: uuid
    VehicleIdFilter:
      name: vehicle_id
      in: query
      schema:
        type: string
        format: uuid
    InspectionIdFilter:
      name: inspection_id
      in: query
      schema:
        type: string
        format: uuid
    DateFromFilter:
      name: date_from
      in: query
      schema:
        type: string
        format: date
    DateToFilter:
      name: date_to
      in: query
      schema:
        type: string
        format: date
    SearchQuery:
      name: search
      in: query
      schema:
        type: string

    # Pagination
    PageNumber:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

  schemas:
    # ==================== COMMON ====================
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object

    ValidationError:
      type: object
      required: [code, message, errors]
      properties:
        code:
          type: string
          example: "VALIDATION_ERROR"
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_count:
          type: integer
        total_pages:
          type: integer

    # ==================== AUTH ====================
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        country_id:
          type: string
          format: uuid

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          default: bearer
        expires_in:
          type: integer
        user:
          $ref: '#/components/schemas/UserProfile'

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        phone:
          type: string
        country_id:
          type: string
          format: uuid
        country_name:
          type: string
        department_id:
          type: string
          format: uuid
        department_name:
          type: string
        role_id:
          type: string
          format: uuid
        role_ids:
          type: array
          items:
            type: string
            format: uuid
        roles:
          type: array
          items:
            $ref: '#/components/schemas/RoleSummary'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        visible_tabs:
          type: array
          items:
            type: string

    RoleSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        level:
          type: integer

    Permission:
      type: object
      properties:
        name:
          type: string
        resource:
          type: string
        action:
          type: string
        scope:
          type: string
          enum: [all, country, team, own]

    # ==================== EMPLOYEE ====================
    Employee:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        phone:
          type: string
        country_id:
          type: string
          format: uuid
        country_name:
          type: string
        department_id:
          type: string
          format: uuid
        department_name:
          type: string
        role_id:
          type: string
          format: uuid
        role_ids:
          type: array
          items:
            type: string
            format: uuid
        roles:
          type: array
          items:
            $ref: '#/components/schemas/RoleSummary'
        employment_type:
          type: string
