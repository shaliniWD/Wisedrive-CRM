      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
          minLength: 6
        phone:
          type: string
        country_id:
          type: string
          format: uuid
        department_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        role_ids:
          type: array
          items:
            type: string
            format: uuid
        employment_type:
          type: string
          enum: [full_time, part_time, freelancer, contractor]

    EmployeeUpdateRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        country_id:
          type: string
          format: uuid
        department_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        role_ids:
          type: array
          items:
            type: string
            format: uuid
        employment_type:
          type: string
        employment_status:
          type: string
          enum: [active, exited]
        exit_date:
