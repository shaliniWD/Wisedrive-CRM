          additionalProperties: true
        raw_frames:
          type: array
          items:
            type: string
          description: Raw OBD frame data for debugging

    OBDSessionRequest:
      type: object
      required: [vin, protocol, scanned_at]
      properties:
        vin:
          type: string
        protocol:
          type: string
        ecu_info:
          type: object
        dtc_stored:
          type: array
          items:
            $ref: '#/components/schemas/DTCRequest'
        dtc_pending:
          type: array
          items:
            $ref: '#/components/schemas/DTCRequest'
        dtc_permanent:
          type: array
          items:
            $ref: '#/components/schemas/DTCRequest'
        freeze_frame:
          type: object
        live_data:
          type: object
        raw_frames:
          type: array
          items:
            type: string
        scanned_at:
          type: string
          format: date-time

    OBDSessionDetail:
      allOf:
        - $ref: '#/components/schemas/OBDSession'
        - type: object
          properties:
            vehicle:
              $ref: '#/components/schemas/Vehicle'
            inspection:
              $ref: '#/components/schemas/Inspection'

    OBDSessionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OBDSession'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    DTC:
      type: object
      properties:
        code:
          type: string
          example: "P0301"
        category:
          type: string
          enum: [powertrain, chassis, body, network]
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        possible_causes:
          type: array
          items:
            type: string
        recommended_actions:
          type: array
          items:
            type: string

    DTCRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
        raw_data:
          type: string

    DTCCode:
      type: object
      properties:
        code:
          type: string
        category:
          type: string
        description:
          type: string
        severity:
          type: string
        possible_causes:
          type: array
          items:
            type: string
        recommended_actions:
          type: array
          items:
            type: string

    # ==================== PAYMENT ====================
    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        payment_type:
          type: string
          enum: [salary, mechanic_payout, incentive, vendor, statutory, legal, admin_expense, operational, other]
        employee_id:
          type: string
          format: uuid
        employee_name:
          type: string
        vendor_name:
          type: string
        amount:
          type: number
        deductions:
          type: number
        final_amount:
          type: number
        status:
          type: string
          enum: [pending, submitted, approved, paid, rejected]
        payment_mode:
          type: string
        month:
          type: integer
        year:
          type: integer
        country_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    PaymentDetail:
      allOf:
        - $ref: '#/components/schemas/Payment'
        - type: object
          properties:
            employee:
              $ref: '#/components/schemas/Employee'
            gst_percent:
              type: number
            gst_amount:
              type: number
            tds_percent:
              type: number
            tds_amount:
              type: number
            invoice_number:
              type: string
            proofs:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  url:
                    type: string
                  uploaded_at:
                    type: string
            approved_by:
              type: string
            approved_at:
              type: string
              format: date-time

    PaymentCreateRequest:
      type: object
      required: [payment_type, amount, country_id]
      properties:
        payment_type:
          type: string
        employee_id:
          type: string
          format: uuid
        vendor_name:
          type: string
        invoice_number:
          type: string
        amount:
          type: number
        deductions:
          type: number
        gst_percent:
          type: number
        tds_percent:
          type: number
        month:
          type: integer
        year:
          type: integer
        country_id:
          type: string
          format: uuid
        notes:
          type: string

    PaymentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    RazorpayOrderRequest:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: integer
          description: Amount in smallest currency unit (paise for INR)
        currency:
          type: string
          default: INR
        receipt:
          type: string
        notes:
          type: object

    RazorpayOrderResponse:
      type: object
      properties:
        order_id:
          type: string
        amount:
          type: integer
        currency:
          type: string
        key:
          type: string
          description: Razorpay key ID for frontend

    RazorpayVerifyRequest:
      type: object
      required: [razorpay_order_id, razorpay_payment_id, razorpay_signature]
      properties:
        razorpay_order_id:
          type: string
        razorpay_payment_id:
          type: string
        razorpay_signature:
          type: string

    # ==================== REPORT ====================
    InspectionReport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        inspection_id:
          type: string
          format: uuid
        inspection:
          $ref: '#/components/schemas/InspectionDetail'
        vehicle:
          $ref: '#/components/schemas/Vehicle'
        customer:
          $ref: '#/components/schemas/Customer'
        overall_score:
          type: integer
        overall_status:
          type: string
          enum: [excellent, good, fair, poor]
        categories:
          type: array
          items:
            $ref: '#/components/schemas/InspectionCategory'
        obd_data:
          $ref: '#/components/schemas/OBDSession'
        recommendations:
          type: array
          items:
            type: string
        generated_at:
          type: string
          format: date-time
        pdf_url:
          type: string
          format: uri

    ReportListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/InspectionReport'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ==================== CAR DATA ====================
    CarDataLookupRequest:
      type: object
      required: [registration_number]
      properties:
        registration_number:
          type: string
        include_owner:
          type: boolean
          default: false
        include_insurance:
          type: boolean
          default: false
        include_challan:
          type: boolean
          default: false

    CarDataResponse:
      type: object
      properties:
        registration_number:
          type: string
        vin:
          type: string
        engine_number:
          type: string
        make:
          type: string
        model:
          type: string
        variant:
          type: string
        fuel_type:
          type: string
        color:
          type: string
        manufacturing_year:
          type: integer
        registration_date:
          type: string
          format: date
        owner_name:
          type: string
        owner_count:
          type: integer
        rto:
          type: string
        fitness_valid_until:
          type: string
          format: date
        insurance_valid_until:
          type: string
          format: date
        puc_valid_until:
          type: string
          format: date
        hypothecated:
          type: boolean
        hypothecated_to:
          type: string
        blacklisted:
          type: boolean
        challan_pending:
          type: integer
        raw_response:
          type: object
          description: Original response from Invincible Ocean (for debugging)

